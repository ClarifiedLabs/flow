name: release

on:
  workflow_dispatch:
  push:
    branches:
      - "release-ci"
      - "release-ci/**"
    tags:
      - "v*"

permissions:
  contents: read

env:
  RELEASE_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'v0.0.0' }}
  RELEASE_SOURCE_REF: ${{ startsWith(github.ref, 'refs/tags/v') && format('refs/tags/{0}', github.ref_name) || github.sha }}
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAMESPACE: clarifiedlabs

jobs:
  validate:
    name: validate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install test tools
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux
          curl -fsSL https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64 -o ttyd
          chmod 0755 ttyd
          sudo mv ttyd /usr/local/bin/ttyd

      - name: Test
        run: go test ./...

  build-linux:
    name: linux ${{ matrix.goarch }}
    runs-on: ${{ matrix.os_label }}
    needs: validate
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_label: ubuntu-24.04
            goarch: amd64
          - os_label: ubuntu-24.04-arm
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential rpm

      - name: Build binaries
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
          COMMIT: ${{ github.sha }}
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')" scripts/release/build-binaries.sh

      - name: Package archives
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          scripts/release/package-tarball.sh
          scripts/release/package-deb.sh
          scripts/release/package-rpm.sh

      - name: Attest packages
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm

      - name: Upload packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-linux-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
          if-no-files-found: error

  build-macos:
    name: macos arm64
    runs-on: macos-26
    needs: validate
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build binaries
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
          COMMIT: ${{ github.sha }}
          GOOS: darwin
          GOARCH: arm64
        run: DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')" scripts/release/build-binaries.sh

      - name: Package tarball
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
          GOOS: darwin
          GOARCH: arm64
        run: scripts/release/package-tarball.sh

      - name: Package signed and notarized pkg
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
          GOARCH: arm64
          MACOS_DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          MACOS_DEVELOPER_ID_APPLICATION_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_PASSWORD }}
          MACOS_DEVELOPER_ID_INSTALLER_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_INSTALLER_P12_BASE64 }}
          MACOS_DEVELOPER_ID_INSTALLER_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_INSTALLER_PASSWORD }}
          MACOS_DEVELOPER_ID_APPLICATION_IDENTITY: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_IDENTITY }}
          MACOS_DEVELOPER_ID_INSTALLER_IDENTITY: ${{ secrets.MACOS_DEVELOPER_ID_INSTALLER_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
        run: scripts/release/package-pkg.sh

      - name: Package unsigned pkg dry run
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
          GOARCH: arm64
          MACOS_PKG_SIGNING_MODE: unsigned
        run: scripts/release/package-pkg.sh

      - name: Attest packages
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.pkg

      - name: Upload packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-macos-arm64
          path: |
            dist/*.tar.gz
            dist/*.pkg
          if-no-files-found: error

  homebrew-bottles:
    name: homebrew bottle ${{ matrix.formula }} ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.os_label }}
    needs: validate
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        formula:
          - flow
          - flow-server
          - flow-worker
        target:
          - name: macos-arm64
            os_label: macos-26
          - name: macos-amd64
            os_label: macos-26-intel
          - name: linux-amd64
            os_label: ubuntu-24.04
          - name: linux-arm64
            os_label: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Install Homebrew on Linux
        if: startsWith(matrix.target.name, 'linux-')
        run: |
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"

      - name: Create local tap
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          brew tap-new clarifiedlabs/homebrew-tap
          brew trust clarifiedlabs/tap
          echo "TAP_DIR=$(brew --repository clarifiedlabs/homebrew-tap)" >> "$GITHUB_ENV"

      - name: Prepare formula
        env:
          TAG: ${{ env.RELEASE_VERSION }}
          SOURCE_REF: ${{ env.RELEASE_SOURCE_REF }}
        run: |
          SOURCE_URL="https://github.com/${GITHUB_REPOSITORY}/archive/${SOURCE_REF}.tar.gz"
          source_archive="$(mktemp)"
          curl -fsSL -o "$source_archive" "$SOURCE_URL"
          SOURCE_SHA256="$(shasum -a 256 "$source_archive" | awk '{print $1}')"
          SOURCE_URL="$SOURCE_URL" SOURCE_SHA256="$SOURCE_SHA256" scripts/release/homebrew-formula.sh

      - name: Build bottle
        env:
          HOMEBREW_FORMULA: ${{ matrix.formula }}
          TAG: ${{ env.RELEASE_VERSION }}
        run: |
          cd "$TAP_DIR"
          brew install --build-bottle "clarifiedlabs/homebrew-tap/${HOMEBREW_FORMULA}"
          brew test "clarifiedlabs/homebrew-tap/${HOMEBREW_FORMULA}"
          brew bottle --json --root-url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}" "clarifiedlabs/homebrew-tap/${HOMEBREW_FORMULA}"
          mkdir -p "${GITHUB_WORKSPACE}/dist"
          mv ./*.bottle.* "${GITHUB_WORKSPACE}/dist/"

      - name: Attest bottles
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/*.bottle.*

      - name: Upload bottles
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: homebrew-bottle-${{ matrix.formula }}-${{ matrix.target.name }}
          path: dist/*.bottle.*
          if-no-files-found: error

  docker-images-dry-run:
    name: docker image dry run ${{ matrix.image }} ${{ matrix.goarch }}
    runs-on: ${{ matrix.os_label }}
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    needs: validate
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: flow-server
            target: flow-server
            command: flow-server
            os_label: ubuntu-24.04
            goarch: amd64
          - image: flow-server
            target: flow-server
            command: flow-server
            os_label: ubuntu-24.04-arm
            goarch: arm64
          - image: flow-worker
            target: flow-worker
            command: flow-worker
            os_label: ubuntu-24.04
            goarch: amd64
          - image: flow-worker
            target: flow-worker
            command: flow-worker
            os_label: ubuntu-24.04-arm
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Set release date
        id: release-date
        run: echo "date=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/${{ matrix.goarch }}
          load: true
          tags: ${{ matrix.image }}:dry-run-${{ matrix.goarch }}
          build-args: |
            VERSION=${{ env.RELEASE_VERSION }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.release-date.outputs.date }}

      - name: Verify image version
        env:
          COMMAND: ${{ matrix.command }}
          IMAGE: ${{ matrix.image }}:dry-run-${{ matrix.goarch }}
        run: |
          args=()
          if [[ "$COMMAND" == "flow-worker" ]]; then
            args=(-e FLOW_WORKER_DOCKERD=false)
          fi
          output="$(docker run --rm "${args[@]}" "$IMAGE" "$COMMAND" --version)"
          echo "$output"
          case "$output" in
            "$COMMAND ${RELEASE_VERSION}"*) ;;
            *)
              echo "unexpected version output: ${output}" >&2
              exit 1
              ;;
          esac

  docker-images:
    name: docker image ${{ matrix.image }} ${{ matrix.goarch }}
    runs-on: ${{ matrix.os_label }}
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: validate
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: flow-server
            target: flow-server
            os_label: ubuntu-24.04
            goarch: amd64
          - image: flow-server
            target: flow-server
            os_label: ubuntu-24.04-arm
            goarch: arm64
          - image: flow-worker
            target: flow-worker
            os_label: ubuntu-24.04
            goarch: amd64
          - image: flow-worker
            target: flow-worker
            os_label: ubuntu-24.04-arm
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Set release date
        id: release-date
        run: echo "date=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/${{ matrix.goarch }}
          outputs: type=image,name=${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            VERSION=${{ env.RELEASE_VERSION }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.release-date.outputs.date }}

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ matrix.image }}
        run: |
          mkdir -p "dist/digests/${IMAGE}"
          digest="${DIGEST#sha256:}"
          if [[ -z "$digest" || "$digest" == "$DIGEST" ]]; then
            echo "unexpected image digest: ${DIGEST}" >&2
            exit 1
          fi
          touch "dist/digests/${IMAGE}/${digest}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docker-digest-${{ matrix.image }}-${{ matrix.goarch }}
          path: dist/digests/${{ matrix.image }}/*
          if-no-files-found: error
          retention-days: 1

  docker-image-manifests:
    name: docker manifest ${{ matrix.image }}
    runs-on: ubuntu-24.04
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: docker-images
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - flow-server
          - flow-worker
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Download image digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: docker-digest-${{ matrix.image }}-*
          path: digests
          merge-multiple: true

      - name: Set image metadata
        id: image-meta
        env:
          IMAGE: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          version_no_v="${VERSION#v}"
          {
            echo "image=${IMAGE}"
            echo "version=${VERSION}"
            echo "version_no_v=${version_no_v}"
          } >> "$GITHUB_OUTPUT"

      - name: Publish manifest
        env:
          IMAGE: ${{ steps.image-meta.outputs.image }}
          VERSION: ${{ steps.image-meta.outputs.version }}
          VERSION_NO_V: ${{ steps.image-meta.outputs.version_no_v }}
        run: |
          refs=()
          shopt -s nullglob
          for digest_file in digests/*; do
            digest="$(basename "$digest_file")"
            refs+=("${IMAGE}@sha256:${digest}")
          done
          shopt -u nullglob
          if [[ ${#refs[@]} -eq 0 ]]; then
            echo "no image digests found for ${IMAGE}" >&2
            exit 1
          fi
          docker buildx imagetools create \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:${VERSION_NO_V}" \
            -t "${IMAGE}:latest" \
            "${refs[@]}"

      - name: Inspect manifest digest
        id: manifest
        env:
          IMAGE: ${{ steps.image-meta.outputs.image }}
          VERSION: ${{ steps.image-meta.outputs.version }}
        run: |
          manifest_json="$(mktemp)"
          docker buildx imagetools inspect "${IMAGE}:${VERSION}" --format '{{json .Manifest}}' > "$manifest_json"
          digest="$(jq -r '.digest' "$manifest_json")"
          if [[ -z "$digest" || "$digest" == "null" ]]; then
            echo "could not determine manifest digest for ${IMAGE}:${VERSION}" >&2
            cat "$manifest_json" >&2
            exit 1
          fi
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Attest image manifest
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ steps.image-meta.outputs.image }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

  publish:
    name: publish release
    runs-on: ubuntu-24.04
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs:
      - build-linux
      - build-macos
      - docker-image-manifests
      - homebrew-bottles
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Download Homebrew bottles
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: homebrew-bottle-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: scripts/release/checksums.sh

      - name: Attest checksums
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: dist/checksums.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ env.RELEASE_VERSION }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --title "$TAG" --generate-notes
          fi

  publish-dry-run:
    name: publish release dry run
    runs-on: ubuntu-24.04
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    needs:
      - build-linux
      - build-macos
      - docker-images-dry-run
      - homebrew-bottles
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Download Homebrew bottles
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: homebrew-bottle-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: scripts/release/checksums.sh

      - name: Verify release payload
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          required_patterns=(
            "dist/flow_${VERSION}_linux_amd64.tar.gz"
            "dist/flow_${VERSION}_linux_arm64.tar.gz"
            "dist/flow_${VERSION}_darwin_arm64.tar.gz"
            "dist/flow_${VERSION}_darwin_arm64.pkg"
            "dist/*.deb"
            "dist/*.rpm"
            "dist/*.bottle.*"
            "dist/checksums.txt"
          )
          for pattern in "${required_patterns[@]}"; do
            if ! compgen -G "$pattern" >/dev/null; then
              echo "missing dry-run artifact matching ${pattern}" >&2
              exit 1
            fi
          done
          find dist -maxdepth 1 -type f -print | sort
          echo "Dry run only: would publish ${VERSION} artifacts for ${GITHUB_SHA}"

  homebrew-publish-dry-run:
    name: publish homebrew tap dry run
    runs-on: ubuntu-24.04
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    needs: homebrew-bottles
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          path: source

      - name: Install Homebrew
        run: |
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"

      - name: Create local tap
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          brew tap-new clarifiedlabs/homebrew-tap
          brew trust clarifiedlabs/tap
          echo "TAP_DIR=$(brew --repository clarifiedlabs/homebrew-tap)" >> "$GITHUB_ENV"

      - name: Download bottle metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: homebrew-bottle-*
          path: bottles
          merge-multiple: true

      - name: Update formula dry run
        env:
          TAG: ${{ env.RELEASE_VERSION }}
          SOURCE_REF: ${{ env.RELEASE_SOURCE_REF }}
        run: |
          cd source
          SOURCE_URL="https://github.com/${GITHUB_REPOSITORY}/archive/${SOURCE_REF}.tar.gz"
          source_archive="$(mktemp)"
          curl -fsSL -o "$source_archive" "$SOURCE_URL"
          SOURCE_SHA256="$(shasum -a 256 "$source_archive" | awk '{print $1}')"
          SOURCE_URL="$SOURCE_URL" SOURCE_SHA256="$SOURCE_SHA256" scripts/release/homebrew-formula.sh
          cd "$TAP_DIR"
          shopt -s nullglob
          bottle_jsons=("${GITHUB_WORKSPACE}"/bottles/*.json)
          shopt -u nullglob
          if [[ ${#bottle_jsons[@]} -eq 0 ]]; then
            echo "no bottle JSON artifacts found" >&2
            exit 1
          fi
          for bottle_json in "${bottle_jsons[@]}"; do
            brew bottle --merge --write --no-commit "$bottle_json"
          done
          git diff -- Formula/flow.rb Formula/flow-server.rb Formula/flow-worker.rb Formula/flow-full.rb
          echo "Dry run only: would update ClarifiedLabs/homebrew-tap for ${TAG}"

  homebrew-publish:
    name: publish homebrew tap
    runs-on: ubuntu-24.04
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: publish
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          path: source

      - name: Create tap token
        id: tap-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.HOMEBREW_TAP_APP_CLIENT_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: ClarifiedLabs
          repositories: homebrew-tap
          permission-contents: write

      - name: Checkout tap
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          repository: ClarifiedLabs/homebrew-tap
          token: ${{ steps.tap-token.outputs.token }}
          path: homebrew-tap

      - name: Install Homebrew
        run: |
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"

      - name: Register tap checkout
        run: |
          tap_dir="$(brew --repository clarifiedlabs/homebrew-tap)"
          rm -rf "$tap_dir"
          mkdir -p "$(dirname "$tap_dir")"
          ln -s "${GITHUB_WORKSPACE}/homebrew-tap" "$tap_dir"
          git config --global --add safe.directory "${GITHUB_WORKSPACE}/homebrew-tap"
          git config --global --add safe.directory "$tap_dir"
          brew trust clarifiedlabs/tap
          echo "TAP_DIR=$tap_dir" >> "$GITHUB_ENV"

      - name: Download bottle metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: homebrew-bottle-*
          path: bottles
          merge-multiple: true

      - name: Update formula
        env:
          TAG: ${{ env.RELEASE_VERSION }}
          SOURCE_REF: ${{ env.RELEASE_SOURCE_REF }}
        run: |
          cd source
          SOURCE_URL="https://github.com/${GITHUB_REPOSITORY}/archive/${SOURCE_REF}.tar.gz"
          source_archive="$(mktemp)"
          curl -fsSL -o "$source_archive" "$SOURCE_URL"
          SOURCE_SHA256="$(shasum -a 256 "$source_archive" | awk '{print $1}')"
          SOURCE_URL="$SOURCE_URL" SOURCE_SHA256="$SOURCE_SHA256" scripts/release/homebrew-formula.sh
          cd "$TAP_DIR"
          shopt -s nullglob
          bottle_jsons=("${GITHUB_WORKSPACE}"/bottles/*.json)
          shopt -u nullglob
          if [[ ${#bottle_jsons[@]} -eq 0 ]]; then
            echo "no bottle JSON artifacts found" >&2
            exit 1
          fi
          for bottle_json in "${bottle_jsons[@]}"; do
            brew bottle --merge --write --no-commit "$bottle_json"
          done

      - name: Commit tap update
        env:
          TAG: ${{ env.RELEASE_VERSION }}
        run: |
          cd homebrew-tap
          git config user.name "${{ steps.tap-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.tap-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git add Formula/flow.rb Formula/flow-server.rb Formula/flow-worker.rb Formula/flow-full.rb
          if git diff --cached --quiet; then
            echo "No Homebrew formula changes"
          else
            git commit -m "chore: update flow ${TAG}"
            git push
          fi
